{% extends "base.html" %}

{% block title %}404 — Target Not Found | ValoCheck{% endblock %}

{% block content %}
<div class="container error-page">
    <div class="error-visual">
        {# Crosshair SVG #}
        <svg class="error-crosshair" viewBox="0 0 200 200" width="100" height="100">
            <circle cx="100" cy="100" r="40" fill="none" stroke="var(--primary)" stroke-width="2" opacity="0.3"/>
            <circle cx="100" cy="100" r="20" fill="none" stroke="var(--primary)" stroke-width="1.5" opacity="0.5"/>
            <line x1="100" y1="50" x2="100" y2="80" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="100" y1="120" x2="100" y2="150" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="50" y1="100" x2="80" y2="100" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="120" y1="100" x2="150" y2="100" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="100" cy="100" r="3" fill="var(--primary)"/>
        </svg>
    </div>
    <div class="error-vandal">
        {% include '_partials/_vandal.html' with context %}
    </div>
    <div class="error-code">404</div>
    <h1>Target Not Found</h1>
    <p>Missed the shot. This player doesn't exist or the page moved.</p>
    <form class="search-form error-search" action="/search" method="get" autocomplete="off">
        <div class="search-wrapper">
            <input type="text" name="q" class="search-input" placeholder="Try another Name#TAG" required aria-label="Search player">
            <button type="submit" class="search-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
            </button>
        </div>
    </form>
    <a href="/" class="btn">Back to Base</a>
</div>
{% endblock %}
