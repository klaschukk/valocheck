{% extends "base.html" %}

{% block title %}404 — Not Found | ValoCheck{% endblock %}

{% block content %}
<div class="container error-page">
    <div class="error-visual">
        <svg class="error-crosshair" viewBox="0 0 200 200" width="80" height="80">
            <circle cx="100" cy="100" r="45" fill="none" stroke="var(--primary)" stroke-width="1.5" opacity="0.2"/>
            <circle cx="100" cy="100" r="25" fill="none" stroke="var(--primary)" stroke-width="1.5" opacity="0.4"/>
            <line x1="100" y1="45" x2="100" y2="75" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="100" y1="125" x2="100" y2="155" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="45" y1="100" x2="75" y2="100" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="125" y1="100" x2="155" y2="100" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="100" cy="100" r="3" fill="var(--primary)"/>
        </svg>
    </div>
    <div class="error-code">404</div>
    <h1>Target Not Found</h1>
    <p>This player ghosted or the page moved.</p>
    <form class="search-form error-search" action="/search" method="get" autocomplete="off">
        <div class="search-wrapper">
            <input type="text" name="q" class="search-input" placeholder="Try another Name#TAG" required aria-label="Search player">
            <button type="submit" class="search-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
        </div>
    </form>
    <a href="/" class="btn">Back to Base</a>
</div>
{% endblock %}
